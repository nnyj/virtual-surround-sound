name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build vss_apo.dll
        working-directory: apo
        shell: cmd
        run: |
          if not exist build md build
          cl /nologo /O2 /W3 /EHsc /std:c++17 /LD src\vss_apo.cpp /Fobuild\ /Febuild\vss_apo.dll /link /DEF:src\vss_apo.def ole32.lib advapi32.lib avrt.lib uuid.lib

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: apo/build/vss_apo.dll
